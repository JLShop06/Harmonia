<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f1eb" />
  <meta name="description" content="Connexion à Harmonia, votre espace premium." />

  <title>Connexion - Harmonia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="auth-container">
    <div class="badge">Espace membre</div>
    <h1>Harmonia</h1>
    <p>Connexion à votre espace premium</p>

    <form id="login-form">
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Email"
        autocomplete="email"
        required
      />

      <input
        type="password"
        id="password"
        name="password"
        placeholder="Mot de passe"
        autocomplete="current-password"
        required
      />

      <button type="submit">Se connecter</button>
    </form>

    <p class="muted">
      Pas encore membre ? <a href="#" class="link-underline">Créer un compte</a>
    </p>

    <p id="error" class="error-message" aria-live="polite"></p>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://vbdgumnlpgpiaeckqnum.supabase.co",
      "TON_ANON_KEY_ICI"
    );

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorBox.textContent = "Email ou mot de passe incorrect.";
        return;
      }

      window.location.href = "dashboard.html";
    });
  </script>

</body>
</html>

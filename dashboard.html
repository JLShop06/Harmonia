<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f1eb" />
  <meta name="description" content="Dashboard Harmonia - votre espace premium." />

  <title>Dashboard - Harmonia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <nav class="topbar">
      <a href="index.html" class="brand">
        <img src="logo-harmonia.png" alt="Harmonia" class="brand-logo" />
        <span class="brand-name">Harmonia</span>
      </a>

      <div class="nav-links">
        <span id="user-email" class="user-email"></span>
        <button type="button" class="nav-cta" id="logout-btn">Déconnexion</button>
      </div>
    </nav>
  </header>

  <main class="dashboard">
    <section class="card">
      <div class="badge">Aujourd’hui</div>
      <h2>Programme du jour</h2>
      <p>10 min respiration</p>
      <p>15 min yoga doux</p>
      <p>5 min méditation sommeil</p>
    </section>

    <section class="card">
      <div class="badge">Progression</div>
      <h2>Ton évolution</h2>
      <p>🔥 7 jours consécutifs</p>
      <p>📈 Niveau : Débutant +</p>
    </section>

    <section class="card">
      <div class="badge">Abonnement</div>
      <h2>Statut premium</h2>
      <p>Chargement...</p>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://vbdgumnlpgpiaeckqnum.supabase.co",
      "TON_ANON_KEY_ICI"
    );

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "login.html";
        return;
      }

      document.getElementById("user-email").textContent = user.email;

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "login.html";
      });
    });
  </script>

</body>
</html>
